services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotdeal-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/hotdeal
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms128m -Xmx320m -XX:+UseSerialGC -XX:+ExitOnOutOfMemoryError}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_FAIL_OPEN: "false"
      RATE_LIMIT_PUBLIC_CAPACITY: 120
      RATE_LIMIT_PUBLIC_REFILL_TOKENS: 120
      RATE_LIMIT_PUBLIC_REFILL_SECONDS: 60
      RATE_LIMIT_ADMIN_CAPACITY: 20
      RATE_LIMIT_ADMIN_REFILL_TOKENS: 20
      RATE_LIMIT_ADMIN_REFILL_SECONDS: 60
      CRAWLER_REQUEST_DELAY_MIN_MS: 300
      CRAWLER_REQUEST_DELAY_MAX_MS: 1200
    ports:
      - "8080:8080"
    restart: unless-stopped
    mem_limit: ${APP_MEM_LIMIT:-512m}
    memswap_limit: ${APP_MEMSWAP_LIMIT:-1g}
    mem_swappiness: ${APP_MEM_SWAPPINESS:-60}

  postgres:
    image: postgres:17
    container_name: hotdeal-postgres
    environment:
      POSTGRES_DB: hotdeal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotdeal"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: ${POSTGRES_MEM_LIMIT:-256m}
    memswap_limit: ${POSTGRES_MEMSWAP_LIMIT:-512m}
    mem_swappiness: ${POSTGRES_MEM_SWAPPINESS:-30}

  redis:
    image: redis:8
    container_name: hotdeal-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: ${REDIS_MEM_LIMIT:-128m}
    memswap_limit: ${REDIS_MEMSWAP_LIMIT:-256m}
    mem_swappiness: ${REDIS_MEM_SWAPPINESS:-20}

volumes:
  postgres_data:
  redis_data:
