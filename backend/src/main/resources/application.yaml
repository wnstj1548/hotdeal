spring:
  application:
    name: hotdeal
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hotdeal}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  cache:
    type: redis
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

app:
  crawler:
    enabled: ${CRAWLER_ENABLED:true}
    fixed-delay-ms: ${CRAWLER_FIXED_DELAY_MS:180000}
    initial-delay-ms: ${CRAWLER_INITIAL_DELAY_MS:10000}
    timeout-ms: ${CRAWLER_TIMEOUT_MS:10000}
    max-items-per-source: ${CRAWLER_MAX_ITEMS_PER_SOURCE:60}
    user-agent: ${CRAWLER_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36}
    incremental-enabled: ${CRAWLER_INCREMENTAL_ENABLED:true}
    incremental-overlap-minutes: ${CRAWLER_INCREMENTAL_OVERLAP_MINUTES:20}
    incremental-min-refresh-count: ${CRAWLER_INCREMENTAL_MIN_REFRESH_COUNT:20}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    fail-open: ${RATE_LIMIT_FAIL_OPEN:true}
    redis-key-prefix: ${RATE_LIMIT_REDIS_KEY_PREFIX:rate-limit}
    public-api:
      capacity: ${RATE_LIMIT_PUBLIC_CAPACITY:120}
      refill-tokens: ${RATE_LIMIT_PUBLIC_REFILL_TOKENS:120}
      refill-seconds: ${RATE_LIMIT_PUBLIC_REFILL_SECONDS:60}
    admin-api:
      capacity: ${RATE_LIMIT_ADMIN_CAPACITY:20}
      refill-tokens: ${RATE_LIMIT_ADMIN_REFILL_TOKENS:20}
      refill-seconds: ${RATE_LIMIT_ADMIN_REFILL_SECONDS:60}

logging:
  level:
    com.web.hotdeal: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger
