services:
  app:
    image: ${APP_IMAGE:-hotdeal-backend:latest}
    container_name: hotdeal-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hotdeal}
      DB_USERNAME: ${POSTGRES_USER:-hotdeal}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms128m -Xmx320m -XX:+UseSerialGC -XX:+ExitOnOutOfMemoryError}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      CRAWLER_TIMEOUT_MS: ${CRAWLER_TIMEOUT_MS:-30000}
      CRAWLER_REQUEST_DELAY_MIN_MS: ${CRAWLER_REQUEST_DELAY_MIN_MS:-300}
      CRAWLER_REQUEST_DELAY_MAX_MS: ${CRAWLER_REQUEST_DELAY_MAX_MS:-1200}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-this-redis-password}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
    expose:
      - "8080"
    restart: unless-stopped
    mem_limit: ${APP_MEM_LIMIT:-512m}
    memswap_limit: ${APP_MEMSWAP_LIMIT:-1g}
    mem_swappiness: ${APP_MEM_SWAPPINESS:-60}

  postgres:
    image: postgres:17
    container_name: hotdeal-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotdeal}
      POSTGRES_USER: ${POSTGRES_USER:-hotdeal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotdeal} -d ${POSTGRES_DB:-hotdeal}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: ${POSTGRES_MEM_LIMIT:-256m}
    memswap_limit: ${POSTGRES_MEMSWAP_LIMIT:-512m}
    mem_swappiness: ${POSTGRES_MEM_SWAPPINESS:-30}

  redis:
    image: redis:8
    container_name: hotdeal-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-change-this-redis-password}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-change-this-redis-password} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: ${REDIS_MEM_LIMIT:-128m}
    memswap_limit: ${REDIS_MEMSWAP_LIMIT:-256m}
    mem_swappiness: ${REDIS_MEM_SWAPPINESS:-20}

  caddy:
    image: caddy:2.10-alpine
    container_name: hotdeal-caddy
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    mem_limit: ${CADDY_MEM_LIMIT:-96m}
    memswap_limit: ${CADDY_MEMSWAP_LIMIT:-192m}
    mem_swappiness: ${CADDY_MEM_SWAPPINESS:-10}

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
