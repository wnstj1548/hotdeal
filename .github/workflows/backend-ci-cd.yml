name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci-cd.yml"
  workflow_dispatch:

jobs:
  ci:
    name: CI (Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew --no-daemon test

  deploy:
    name: Deploy to Server
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy source and deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "backend/.dockerignore,backend/Dockerfile,backend/build.gradle,backend/settings.gradle,backend/gradlew,backend/gradle,backend/src,backend/deploy/docker-compose.prod.yml"
          target: "~/hotdeal"
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          APPLICATION_PROD_YML: ${{ secrets.APPLICATION_PROD_YML }}
          DOMAIN: ${{ vars.DOMAIN }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          envs: APPLICATION_PROD_YML,DOMAIN,ACME_EMAIL
          script: |
            set -euo pipefail

            if [ -z "${APPLICATION_PROD_YML}" ]; then
              echo "APPLICATION_PROD_YML secret is required."
              exit 1
            fi

            mkdir -p ~/hotdeal/backend/config ~/hotdeal/backend/deploy/caddy
            printf '%s' "${APPLICATION_PROD_YML}" > ~/hotdeal/backend/config/application-prod.yml
            chmod 600 ~/hotdeal/backend/config/application-prod.yml

            if [ -n "${DOMAIN}" ]; then
              if [ -n "${ACME_EMAIL}" ]; then
                cat > ~/hotdeal/backend/deploy/caddy/Caddyfile <<EOF
            {
              email ${ACME_EMAIL}
            }

            ${DOMAIN} {
              encode gzip
              reverse_proxy app:8080
            }
            EOF
              else
                cat > ~/hotdeal/backend/deploy/caddy/Caddyfile <<EOF
            ${DOMAIN} {
              encode gzip
              reverse_proxy app:8080
            }
            EOF
              fi
            else
              cat > ~/hotdeal/backend/deploy/caddy/Caddyfile <<EOF
            :80 {
              encode gzip
              reverse_proxy app:8080
            }
            EOF
            fi

            COMPOSE_FILE=~/hotdeal/backend/deploy/docker-compose.prod.yml

            if [ ! -f "${COMPOSE_FILE}" ]; then
              echo "docker-compose.prod.yml not found on server."
              exit 1
            fi

            docker compose -f "${COMPOSE_FILE}" build app
            docker compose -f "${COMPOSE_FILE}" up -d --remove-orphans
            docker image prune -f
