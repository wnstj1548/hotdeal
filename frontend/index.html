<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>핫딜 모음 | 실시간 핫딜 알림</title>
    <meta
      name="description"
      content="핫딜 모음에서 뽐뿌, 클리앙, 에펨코리아, 이오미새 등 커뮤니티 핫딜을 한 번에 모아보고 실시간으로 확인하세요."
    />
    <meta
      name="keywords"
      content="핫딜, 핫딜 모음, 핫딜 알림, 실시간 핫딜, 뽐뿌 핫딜, 클리앙 핫딜, 에펨코리아 핫딜, 이오미새 핫딜"
    />
    <meta name="robots" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1" />
    <meta name="theme-color" content="#0f172a" />

    <link rel="canonical" href="https://hotdeal-web.vercel.app/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="핫딜 모음" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:title" content="핫딜 모음 | 실시간 핫딜 알림" />
    <meta
      property="og:description"
      content="뽐뿌, 클리앙, 에펨코리아, 어미새 등 커뮤니티 핫딜을 실시간으로 모아보세요."
    />
    <meta property="og:url" content="https://www.dealmoa.store/" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="핫딜 모음 | 실시간 핫딜 알림" />
    <meta
      name="twitter:description"
      content="뽐뿌, 클리앙, 에펨코리아, 어미새 등 커뮤니티 핫딜을 실시간으로 모아보세요."
    />

    <script id="website-schema" type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "핫딜 모음",
        "alternateName": ["핫딜", "핫딜 알림", "Hotdeal"],
        "url": "https://hotdeal-web.vercel.app/",
        "inLanguage": "ko-KR",
        "description": "핫딜 모음에서 커뮤니티별 실시간 핫딜을 한 번에 확인하세요."
      }
    </script>

    <script>
      (function () {
        var absolute = window.location.origin + window.location.pathname;
        var canonical = document.querySelector('link[rel="canonical"]');
        if (canonical) canonical.setAttribute("href", absolute);
        var ogUrl = document.querySelector('meta[property="og:url"]');
        if (ogUrl) ogUrl.setAttribute("content", absolute);
        var websiteSchema = document.getElementById("website-schema");
        if (websiteSchema && websiteSchema.textContent) {
          try {
            var schema = JSON.parse(websiteSchema.textContent);
            schema.url = window.location.origin + "/";
            websiteSchema.textContent = JSON.stringify(schema);
          } catch (_) {}
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
