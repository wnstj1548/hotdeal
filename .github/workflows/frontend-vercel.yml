name: Frontend Vercel Deploy

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-vercel.yml"
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.diff.outputs.backend_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths in push range
        id: diff
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-parse "$AFTER^" || true)"
          fi

          if [ -z "${BEFORE:-}" ]; then
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$BEFORE" "$AFTER" | grep -E -q '^(backend/|\.github/workflows/deploy\.yml$)'; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-prod:
    needs: detect-changes
    name: Build and Deploy Frontend (Prod)
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.backend_changed != 'true')
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ vars.FRONTEND_SITE_URL }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate SEO files
        working-directory: frontend
        run: |
          set -euo pipefail
          URL="${SITE_URL:-https://hotdeal-web.vercel.app}"
          URL="${URL%/}"

          cat > public/robots.txt <<EOF
          User-agent: *
          Allow: /

          Sitemap: ${URL}/sitemap.xml
          EOF

          cat > public/sitemap.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>${URL}/</loc>
              <changefreq>hourly</changefreq>
              <priority>1.0</priority>
            </url>
          </urlset>
          EOF

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
