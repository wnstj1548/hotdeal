name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.diff.outputs.frontend_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths in push range
        id: diff
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-parse "$AFTER^" || true)"
          fi

          if [ -z "${BEFORE:-}" ]; then
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$BEFORE" "$AFTER" | grep -E -q '^(frontend/|\.github/workflows/frontend-vercel\.yml$)'; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.frontend_changed != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Validate required settings
        shell: bash
        run: |
          if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "::error::Missing Actions secret: AWS_ROLE_ARN"
            exit 1
          fi

          for key in AWS_REGION ECR_REPOSITORY EC2_INSTANCE_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing Actions variable: $key"
              exit 1
            fi
          done

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend JAR
        working-directory: backend
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon bootJar
          mkdir -p deploy-artifacts
          JAR_PATH=$(ls -1 build/libs/*.jar | grep -v "plain" | head -n 1)
          cp "$JAR_PATH" deploy-artifacts/app.jar

      - name: Build and push image
        id: build-image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA"
          IMAGE_LATEST="$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          docker buildx build \
            --platform linux/arm64 \
            -f backend/Dockerfile.deploy \
            -t "$IMAGE_URI" \
            -t "$IMAGE_LATEST" \
            --push \
            backend

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Deploy on EC2 through SSM
        shell: bash
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image_uri }}
        run: |
          COMMAND_ID=$(
            aws ssm send-command \
              --instance-ids "$EC2_INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy $GITHUB_SHA" \
              --parameters "{\"commands\":[\"sudo /usr/local/bin/hotdeal-deploy $IMAGE_URI\"]}" \
              --query "Command.CommandId" \
              --output text
          )

          set +e
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID"
          WAIT_EXIT_CODE=$?
          set -e

          STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID" --query "Status" --output text)
          echo "SSM command status: $STATUS"

          if [ "$WAIT_EXIT_CODE" -ne 0 ] || [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID" --query "StandardOutputContent" --output text || true
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID" --query "StandardErrorContent" --output text || true
            exit 1
          fi
